name: Daily OtoDom Scraper

on:
  schedule:
    - cron: '0 1 * * *'  # Uruchamia się codziennie o 01:00 AM UTC
  workflow_dispatch:  # Pozwala na ręczne uruchomienie

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create .env file
      run: |
        echo "NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}" > .env
        echo "NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}" >> .env
        
    - name: Debug environment
      run: |
        echo "Python version:"
        python --version
        echo "Checking .env file existence:"
        ls -la .env
        echo "Checking if NOTION_API_KEY is set (length only):"
        if [ -n "${{ secrets.NOTION_API_KEY }}" ]; then echo "NOTION_API_KEY length: ${#NOTION_API_KEY}"; else echo "NOTION_API_KEY is not set"; fi
        echo "Checking if NOTION_DATABASE_ID is set (length only):"
        if [ -n "${{ secrets.NOTION_DATABASE_ID }}" ]; then echo "NOTION_DATABASE_ID length: ${#NOTION_DATABASE_ID}"; else echo "NOTION_DATABASE_ID is not set"; fi
        echo "Installed packages:"
        pip freeze
      
    - name: Run scraper with debug output
      run: |
        echo "Starting scraper..."
        # Upewnij się, że katalog debug istnieje
        mkdir -p debug
        # Uruchom scraper i zapisz output do pliku
        python -u scraper.py 2>&1 | tee debug/scraper_output.log
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        PYTHONUNBUFFERED: 1
        
    - name: Prepare logs for upload
      if: always()
      run: |
        # Utwórz katalog na logi
        mkdir -p logs
        # Skopiuj pliki logów jeśli istnieją
        [ -f "scraper.log" ] && cp scraper.log logs/ || echo "scraper.log not found"
        [ -f "debug/scraper_output.log" ] && cp debug/scraper_output.log logs/ || echo "scraper_output.log not found"
        # Skopiuj pliki debug HTML jeśli istnieją
        find . -name "debug_*.html" -exec cp {} logs/ \; || echo "No debug HTML files found"
        # Lista znalezionych plików
        echo "Files found for upload:"
        ls -la logs/
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: scraper-logs
        path: logs/
        if-no-files-found: warn
      
    - name: Handle errors
      if: failure()
      run: |
        echo "Scraper failed to run properly"
        echo "Checking logs for errors:"
        if [ -f "logs/scraper.log" ]; then
          echo "=== scraper.log ==="
          cat logs/scraper.log
        fi
        if [ -f "logs/scraper_output.log" ]; then
          echo "=== scraper_output.log ==="
          cat logs/scraper_output.log
        fi
        exit 1 